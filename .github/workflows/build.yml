name: Build

# HopToDesk masaüstü istemcisi Sciter UI kullanır (flutter yalnızca mobil içindir;
# flutter masaüstü kodu upstream'de derlenmiyor). Bu yüzden masaüstü derlemesi
# upstream ile aynı şekilde: cargo + packui (sciter UI arşivi) + sciter runtime.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  RUST_VERSION: "1.75"
  SCITER_SDK_COMMIT: "9f1724a45f5a53c4d513b02ed01cdbdab08fa0e5"

jobs:
  windows-x64:
    runs-on: windows-2022
    env:
      VCPKG_ROOT: C:\vcpkg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-x64-sciter

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-win-x64-vpx-yuv-opus-v1

      - name: Install vcpkg dependencies
        run: vcpkg install libvpx:x64-windows-static libyuv:x64-windows-static opus:x64-windows-static

      - name: Download sciter packfolder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path target | Out-Null
          $url = "https://github.com/c-smile/sciter-sdk/raw/${{ env.SCITER_SDK_COMMIT }}/bin.win/packfolder.exe"
          Invoke-WebRequest -Uri $url -OutFile target\packfolder.exe
          # build.rs varlık kontrolünü uzantısız yolla yapıyor
          Copy-Item target\packfolder.exe target\packfolder

      - name: Build (sciter UI, packui)
        run: cargo build --release --features packui

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target\release\hoptodesk.exe dist\YedikareRemote.exe
          $url = "https://github.com/c-smile/sciter-sdk/raw/${{ env.SCITER_SDK_COMMIT }}/bin.win/x64/sciter.dll"
          Invoke-WebRequest -Uri $url -OutFile dist\sciter.dll
          Compress-Archive -Path dist\* -DestinationPath YedikareRemote-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: YedikareRemote-windows-x64
          path: YedikareRemote-windows-x64.zip

      - name: Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: YedikareRemote-windows-x64.zip

  # macOS işi Windows yeşile dönünce eklenecek:
  # cargo build --features packui + cargo-bundle + libsciter-osx dylib
