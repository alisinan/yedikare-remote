name: Build

# HopToDesk masaüstü istemcisi Sciter UI kullanır (flutter yalnızca mobil içindir;
# flutter masaüstü kodu upstream'de derlenmiyor). Bu yüzden masaüstü derlemesi
# upstream ile aynı şekilde: cargo + packui (sciter UI arşivi) + sciter runtime.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# Release adımı (softprops/action-gh-release) için gerekli
permissions:
  contents: write

env:
  RUST_VERSION: "1.75"
  SCITER_SDK_COMMIT: "9f1724a45f5a53c4d513b02ed01cdbdab08fa0e5"

jobs:
  windows-x64:
    runs-on: windows-2022
    env:
      VCPKG_ROOT: C:\vcpkg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-x64-sciter

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-win-x64-vpx-yuv-opus-v1

      - name: Install vcpkg dependencies
        run: vcpkg install libvpx:x64-windows-static libyuv:x64-windows-static opus:x64-windows-static

      - name: Download sciter packfolder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path target | Out-Null
          $url = "https://github.com/c-smile/sciter-sdk/raw/${{ env.SCITER_SDK_COMMIT }}/bin.win/packfolder.exe"
          Invoke-WebRequest -Uri $url -OutFile target\packfolder.exe
          # build.rs varlık kontrolünü uzantısız yolla yapıyor
          Copy-Item target\packfolder.exe target\packfolder

      - name: Build (sciter UI, packui)
        run: cargo build --release --features packui

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target\release\hoptodesk.exe dist\YedikareRemote.exe
          $url = "https://github.com/c-smile/sciter-sdk/raw/${{ env.SCITER_SDK_COMMIT }}/bin.win/x64/sciter.dll"
          Invoke-WebRequest -Uri $url -OutFile dist\sciter.dll
          Compress-Archive -Path dist\* -DestinationPath YedikareRemote-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: YedikareRemote-windows-x64
          path: YedikareRemote-windows-x64.zip

      - name: Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: YedikareRemote-windows-x64.zip

  # macOS: yalnızca Apple Silicon (arm64) hedeflenir; sciter dylib universal.
  macos-arm64:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: brew install nasm yasm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-arm64-sciter

      - name: Setup vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg "$HOME/vcpkg"
          "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: ~/vcpkg/installed
          key: vcpkg-macos-arm64-vpx-yuv-opus-v1

      - name: Install vcpkg dependencies
        run: |
          "$VCPKG_ROOT/vcpkg" install libvpx:arm64-osx libyuv:arm64-osx opus:arm64-osx

      - name: Download sciter packfolder
        run: |
          mkdir -p target
          curl -L -o target/packfolder "https://github.com/c-smile/sciter-sdk/raw/${{ env.SCITER_SDK_COMMIT }}/bin.osx/packfolder"
          chmod +x target/packfolder

      - name: Build (sciter UI, packui)
        run: cargo build --release --features packui

      - name: Assemble .app and DMG
        run: |
          APP=dist/YedikareRemote.app
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp target/release/hoptodesk "$APP/Contents/MacOS/YedikareRemote"
          curl -L -o "$APP/Contents/MacOS/libsciter.dylib" \
            "https://github.com/c-smile/sciter-sdk/raw/${{ env.SCITER_SDK_COMMIT }}/bin.osx/libsciter.dylib"
          cp res/YedikareRemote.icns "$APP/Contents/Resources/"
          cat > "$APP/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>YedikareRemote</string>
            <key>CFBundleDisplayName</key><string>Yedikare Remote</string>
            <key>CFBundleIdentifier</key><string>com.yedikare.remote</string>
            <key>CFBundleExecutable</key><string>YedikareRemote</string>
            <key>CFBundleIconFile</key><string>YedikareRemote</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>1.46.1</string>
            <key>CFBundleVersion</key><string>1.46.1</string>
            <key>LSMinimumSystemVersion</key><string>10.14</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>NSMicrophoneUsageDescription</key>
            <string>Record the sound from microphone for the purpose of the remote desktop.</string>
          </dict>
          </plist>
          PLIST
          codesign --force --deep --sign - "$APP"
          ln -s /Applications dist/Applications
          hdiutil create -volname "Yedikare Remote" -srcfolder dist -ov -format UDZO YedikareRemote-macos-arm64.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: YedikareRemote-macos-arm64
          path: YedikareRemote-macos-arm64.dmg

      - name: Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: YedikareRemote-macos-arm64.dmg
